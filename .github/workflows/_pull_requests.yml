name: tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'helm-chart/**'
      - 'evaluation_results/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'helm-chart/**'
      - 'evaluation_results/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167
        with:
          activate-environment: Talk2PowerSystemLLM
          environment-file: environment.yml
          auto-activate-base: false

      - name: Install dependencies with Poetry
        shell: bash -l {0}
        run: |
          conda activate Talk2PowerSystemLLM
          poetry install --no-interaction --with test

      - name: Run unit tests
        shell: bash -l {0}
        run: |
          conda activate Talk2PowerSystemLLM
          poetry run pytest --cov=talk2powersystemllm --cov-report=term-missing tests/unit_tests/

      - name: Create GraphDB License File
        run: |
          echo -n "${{ secrets.GRAPHDB_LICENSE }}" | base64 -d > graphdb.license
        working-directory: tests/acceptance_tests/docker-compose/
        shell: bash

      - name: Build Docker images for acceptance tests
        run: |
          bash ./docker/generate-manifest.sh
          docker buildx build --file docker/Dockerfile --tag talk2powersystem .
          docker buildx build --file tests/acceptance_tests/docker-compose/DockerfileAcceptanceTests --tag talk2powersystem-acceptance-tests .
          docker buildx build --file tests/acceptance_tests/docker-compose/DockerfileGraphDB --tag graphdb .

      - name: Run acceptance tests with Completions API
        run: |
          LLM_SEED=1 docker compose -f tests/acceptance_tests/docker-compose/docker-compose.yaml run --rm talk2powersystem-acceptance-tests poetry run pytest tests/acceptance_tests/

      - name: Run acceptance tests with Responses API
        run: |
          LLM_USE_RESPONSES_API=true docker compose -f tests/acceptance_tests/docker-compose/docker-compose.yaml run --rm talk2powersystem-acceptance-tests poetry run pytest tests/acceptance_tests/

      - name: Always clean up Docker Compose
        if: always()
        run: |
          docker compose -f tests/acceptance_tests/docker-compose/docker-compose.yaml down -v --remove-orphans
          rm -f git-manifest.yaml
          rm -f tests/acceptance_tests/docker-compose/graphdb.license
